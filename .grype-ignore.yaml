# Grype ignore rules for known false positives / accepted risks
# Add CVEs here after documenting the reasoning in the GitHub Issue
# Format: https://github.com/anchore/grype#specifying-matches-to-ignore
#
# To add an ignore:
# 1. Document reasoning in the GitHub Issue (why it's not exploitable)
# 2. Add the rule below
# 3. Label the issue as 'false-positive' and close it
# 4. Next scan will skip the ignored CVE

ignore:
  # --- security-tools:latest — Go module transitive deps in compiled binaries ---
  # These are bundled inside BlackArch-installed tools (nuclei, snyk, etc.)
  # Not exploitable: CronJob runs scans and exits, no network services, no user input
  # Reviewed: 2026-04-03, Issues #1-5

  # hashicorp/go-getter — path traversal / arbitrary file write on malicious URL fetch
  # Our scans only hit trusted endpoints we control
  - vulnerability: CVE-2022-26945
    package:
      name: github.com/hashicorp/go-getter
  - vulnerability: CVE-2024-3817
    package:
      name: github.com/hashicorp/go-getter
